  .legend-swatch{width:18px;height:14px;border-radius:2px}
  .chart-wrap{max-width:1000px;margin:0 auto;position:relative}

  .iso{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:400;padding:2px 5px;border-radius:3px;white-space:nowrap;cursor:default;transition:transform .15s,box-shadow .15s;line-height:1.3;position:relative}
  .iso:hover{transform:scale(1.25);z-index:10;box-shadow:0 0 12px rgba(255,255,255,.25)}
  .iso .tri-info{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#1a1a2a;border:1px solid #404060;padding:4px 8px;border-radius:4px;font-size:.55rem;white-space:nowrap;z-index:20;pointer-events:none}
  .iso:hover .tri-info{display:block}
  .green-box{outline:2px solid #2ecc71;outline-offset:1px}
  .red-box{outline:2px solid #e74c3c;outline-offset:1px}
  .empty-row .center-col{color:#e74c3c;font-weight:700}
  .section-start{border-top:2px solid #303050;margin-top:6px;padding-top:6px}
  .section-label{position:absolute;left:-60px;font-size:.55rem;color:#707090;writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:1px;font-weight:600}
  .section-bar{position:absolute;left:-20px;top:0;bottom:0;width:3px;border-radius:2px}
  .stats{text-align:center;margin-top:20px;font-size:.7rem;color:#606080}
  .occ-0{background:rgba(231,76,60,.15);border:1px dashed #e74c3c55}
  .occ-1{background:rgba(255,255,255,.04)}
  .occ-2{background:rgba(255,255,255,.06)}
  .occ-3{background:rgba(255,255,255,.09)}

// Block classification
function getBlock(z) {
  const sBlock = [1,2,3,4,11,12,19,20,37,38,55,56];
  const fBlock = []; for(let i=57;i<=71;i++) fBlock.push(i); for(let i=89;i<=103;i++) fBlock.push(i);
  const dBlock = []; for(let i=21;i<=30;i++) dBlock.push(i); for(let i=39;i<=48;i++) dBlock.push(i); for(let i=72;i<=80;i++) dBlock.push(i);
  if (sBlock.includes(z)) return {block:'s',color:'#4a90d9'};
  if (fBlock.includes(z)) return {block:'f',color:'#9b59b6'};
  if (dBlock.includes(z)) return {block:'d',color:'#e67e22'};
  return {block:'p',color:'#27ae60'};
}

// Period boundaries for mega-boxes
const periodBounds = [
  {label:'Period 1', start:1, end:4},
  {label:'Period 2', start:6, end:22},
  {label:'Period 3', start:23, end:40},
  {label:'Period 4', start:35, end:86},
  {label:'Period 5', start:85, end:138},
  {label:'Period 6', start:130, end:209}
];

// Grammar
function grammar(z, a) {
  if (z < 2) return {nt: a-2*z, nd: 3*z-a-2, valid: false, triFrac: 0};
  const nt = a - 2*z;
  const nd = 3*z - a - 2;
  const total = nt + nd;
  const valid = nt >= 0 && nd >= 0;
  const triFrac = total > 0 ? nt / total : 0;
  return {nt, nd, valid, triFrac};
}

// Color from triton fraction
function triColor(frac, valid) {
  if (!valid) return 'hsl(0, 60%, 40%)';
  // 0 = orange(30), 0.5 = purple(280), 1.0 = blue(220)
  const h = frac < 0.5 ? 30 + frac * 2 * 250 : 220 + (1 - frac) * 2 * 60;
  const hue = 30 + frac * 190;
  const sat = 70 + frac * 20;
  const lit = 35 + (1 - Math.abs(frac - 0.5) * 2) * 15;
  return `hsl(${hue}, ${sat}%, ${lit}%)`;
}

// Group isotopes by A
const byA = {};
ISO.forEach(iso => {
  if (!byA[iso.a]) byA[iso.a] = [];
  byA[iso.a].push(iso);
});

// Check pairing of neighbors for red-box detection
function hasEvenTriNeighbor(z, a) {
  // Check if any isobar at A-1 or A+1 has even n_tri
  for (const da of [-1, 1]) {
    const na = a + da;
    if (byA[na]) {
      for (const nb of byA[na]) {
        const g = grammar(nb.z, nb.a);
        if (g.valid && g.nt % 2 === 0) return true;
      }
    }
  }
  return false;
}

// Render
const chart = document.getElementById('chart');
const maxA = 209;
let totalIso = 0;

// Section tracking
const sectionColors = {s:'#4a90d9',p:'#27ae60',d:'#e67e22',f:'#9b59b6'};
let lastBlock = '';

for (let a = 1; a <= maxA; a++) {
  const isobars = byA[a] || [];
  isobars.sort((x, y) => x.z - y.z);
  const occ = isobars.length;
  totalIso += occ;
  
  const row = document.createElement('div');
  row.className = 'row' + (occ === 0 ? ' empty-row' : '') + ' occ-' + occ;
  
  // Check for section change
  if (isobars.length > 0) {
    const mainZ = isobars[Math.floor(isobars.length/2)].z;
    const bi = getBlock(mainZ);
    if (bi.block !== lastBlock) {
      row.classList.add('section-start');
      lastBlock = bi.block;
    }
  }
  
  // Left column — lower Z isobars (neutron-heavier)
  const leftCol = document.createElement('div');
  leftCol.className = 'left-col';
  
  // Center column — A number
  const centerCol = document.createElement('div');
  centerCol.className = 'center-col';
  centerCol.textContent = a;
  if (occ === 0) centerCol.textContent = '✕ ' + a;
  if (occ === 3) centerCol.style.color = '#c0a040';
  
  // Right column — higher Z isobars (proton-heavier)
  const rightCol = document.createElement('div');
  rightCol.className = 'right-col';
  
  if (occ === 1) {
    // Single isobar — put on left (lower Z, neutron side)
    const iso = isobars[0];
    const g = grammar(iso.z, iso.a);
    const el = makeIsoEl(iso, g);
    leftCol.appendChild(el);
  } else if (occ === 2) {
    // Two isobars — lower Z left, higher Z right
    const g0 = grammar(isobars[0].z, isobars[0].a);
    const g1 = grammar(isobars[1].z, isobars[1].a);
    leftCol.appendChild(makeIsoEl(isobars[0], g0));
    rightCol.appendChild(makeIsoEl(isobars[1], g1));
  } else if (occ >= 3) {
    // Three — lowest left, middle stays center-ish, highest right
    for (let i = 0; i < isobars.length; i++) {
      const g = grammar(isobars[i].z, isobars[i].a);
      const el = makeIsoEl(isobars[i], g);
      if (i === 0) leftCol.appendChild(el);
      else if (i === isobars.length - 1) rightCol.appendChild(el);
      else { /* middle ones go left too */ leftCol.appendChild(el); }
    }
  }
  
  row.appendChild(leftCol);
  row.appendChild(centerCol);
  row.appendChild(rightCol);
  chart.appendChild(row);
}

function makeIsoEl(iso, g) {
  const el = document.createElement('div');
  el.className = 'iso';
  const bg = triColor(g.triFrac, g.valid);
  el.style.background = bg;
  
  // Text color — ensure contrast
  const textColor = g.triFrac > 0.4 ? '#e0e8ff' : '#1a1a2a';
  el.style.color = textColor;
  
  // Block accent
  const bi = getBlock(iso.z);
  el.style.borderLeft = `3px solid ${bi.color}`;
  
  // Green box for even n_tri (paired), red for odd when neighbors are even
  if (g.valid && g.nt >= 0) {
    if (g.nt % 2 === 0) {
      el.classList.add('green-box');
    } else if (hasEvenTriNeighbor(iso.z, iso.a)) {
      el.classList.add('red-box');
    }
  }
  
  el.innerHTML = `<sup>${iso.a}</sup>${iso.s}<sub>${iso.z}</sub>` +
    `<div class="tri-info">` +
    `${iso.s}-${iso.a} (Z=${iso.z})<br>` +
    `n<sub>tri</sub>=${g.nt} n<sub>deu</sub>=${g.nd}<br>` +
    `Tri%: ${(g.triFrac * 100).toFixed(1)}%<br>` +
    `Block: ${bi.block}-block` +
    `</div>`;
  
  return el;
}

// Stats
document.getElementById('stats').innerHTML = 
  `${totalIso} stable isotopes · ${maxA} mass numbers · ` +
  `${Object.values(byA).filter(v=>v.length===0).length + (maxA - Object.keys(byA).filter(k=>k<=maxA).length)} empty · ` +
  `Green = even n<sub>tri</sub> (paired) · Red = odd n<sub>tri</sub> (unpaired, neighbours paired) · ` +
  `Left border: <span style="color:#4a90d9">s</span> <span style="color:#27ae60">p</span> <span style="color:#e67e22">d</span> <span style="color:#9b59b6">f</span> block`;
</script>
